agent:
  input-detection:
    description: "Layered regex patterns (generic + agent-specific) to detect input-waiting state"
  status-state-machine:
    description: "Polled status transitions with timing heuristics and immutable AgentInfo updates"
  type-system:
    description: "Union type + spawnable set + config defaults. Checklist for adding new agents"

global:
  unsubscribe-pattern:
    description: "All event subscriptions return () => void cleanup functions"

ipc:
  channel-naming:
    description: "domain:action channel format, centralized in shared/constants.ts"
  error-responses:
    description: "Return { error: 'code' } on failure, never throw across IPC boundary"
  preload-api-grouping:
    description: "contextBridge API grouped by domain, mirroring channel namespaces"
  readonly-shared-types:
    description: "All IPC interfaces use readonly fields and ReadonlyArray"
  validate-first-handlers:
    description: "All IPC handlers validate raw:unknown via dedicated validator functions"

persistence:
  atomic-file-writes:
    description: "Write to .tmp then rename for crash-safe persistence"
  config-directory-layout:
    description: "~/.vibeide/ directory structure: projects.json, state.json, workspaces/"
  validation-type-guards:
    description: "isValidX() type guards validate persisted data, return false on invalid (never throw)"

terminal:
  frame-coalescing:
    description: "PTY output buffered at 16ms intervals (~60fps), not per-character"
  manager-session-pattern:
    description: "Map-based manager wrapping individual instance classes for resource collections"
  safe-env-allowlist:
    description: "PTY sessions get curated env via allowlist + agent-specific API keys only"
  unified-theme-system:
    description: "AppTheme couples terminal ITheme + chrome CSS vars with auto-enrichment"

ui:
  create-update-split:
    description: "Separate createX() and updateX() functions to avoid full DOM re-renders"
  design-tokens:
    description: "CSS custom properties for colors, spacing, typography, transitions"
  keybinding-system:
    description: "Centralized defaults + user overrides via IPC, command palette integration"
  vanilla-dom-components:
    description: "All UI built with vanilla DOM APIs, class-based with dispose() lifecycle"

voice:
  anti-hallucination-guards:
    description: "LLM formatter defenses: system prompt, few-shot examples, length guard (2.5x)"
  layered-rule-transforms:
    description: "PostProcessor applies rules in order: case → symbols → abbreviations → terminal"
  pipeline-architecture:
    description: "Three-stage voice pipeline: Capture (STT) → PostProcess (rules) → Format (LLM)"
