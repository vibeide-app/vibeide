appId: com.vibeide.app
productName: VibeIDE
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - "!**/*.map"
extraMetadata:
  main: ./out/main/index.js
icon: resources/icons/512x512.png
linux:
  target:
    - AppImage
    - deb
  category: Development
  icon: resources/icons/512x512.png
  synopsis: AI agent terminal orchestrator for vibe coders
  description: >
    VibeIDE is a project-centric terminal orchestrator for developers who use
    AI agents. Manage multiple projects, spawn terminals and AI agents,
    switch between workspaces, and monitor agent status — all from one app.
  desktop:
    StartupWMClass: vibeide
deb:
  afterInstall: scripts/post-install.sh
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
    - libatspi2.0-0
    - libuuid1
appImage:
  artifactName: VibeIDE-${version}-${arch}.AppImage
mac:
  target:
    - dmg
    - zip
  category: public.app-category.developer-tools
  icon: resources/icons/512x512.png
  artifactName: VibeIDE-${version}-${arch}.${ext}
  hardenedRuntime: true
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
dmg:
  artifactName: VibeIDE-${version}-${arch}.dmg
win:
  target:
    - nsis
    - portable
  icon: resources/icons/512x512.png
  artifactName: VibeIDE-${version}-${arch}.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  shortcutName: VibeIDE
publish:
  provider: github
  owner: nandadevaiah
  repo: vibeide
